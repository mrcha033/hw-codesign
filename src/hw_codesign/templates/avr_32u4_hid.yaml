project:
  name: avr_32u4_hid
  description: ATmega32U4 native USB HID controller — keyboard/gamepad/mouse with ICSP programming
  version: 0.1.0
  template: avr_32u4_hid
  created_at: '2026-06-21'

system:
  target_application: USB HID device, custom keyboard, gamepad controller, USB peripheral

compute:
  mcu:
    family: AVR
    variant: ATmega32U4
    clock_mhz: 16
    cores: 1
    flash_kb: 32
    sram_kb: 2.5
    eeprom_kb: 1
    fpu: false
    connectivity: [usb_fullspeed_native]
    hard_realtime_required: false
  debug_interface: ICSP

actuation:
  motor_channels: 0
  gpio_outputs: 20
  pwm_channels: 7

sensing:
  adc_channels: 12
  adc_bits: 10

assumptions:
  - id: ASM-01
    text: 16 MHz crystal required for USB timing compliance; internal RC oscillator not suitable for USB
    rationale: USB full-speed requires ±0.25% frequency accuracy; RC oscillator is ±10%
  - id: ASM-02
    text: 5V bus-powered via USB; no separate LDO needed as ATmega32U4 operates at 5V
    rationale: native USB D+/D- at 3.3V via internal 3V3 regulator output pin; no external reg needed
  - id: ASM-03
    text: ICSP header for AVR ISP programming; no USB bootloader in production fuses
    rationale: custom HID firmware ships with production fuses; USB DFU bootloader optional via Caterina
  - id: ASM-04
    text: HWB pin pulled low for normal boot; USB bootloader can be triggered via HWB+RESET
    rationale: allows field reflash without ICSP hardware when Caterina bootloader installed

electronics:
  backend: tscircuit
  role_set: avr_32u4_hid
  compiled_backend_required: false
  power:
    input_voltage_min_v: 4.5
    input_voltage_max_v: 5.5
    input_connector: USB-C
    bus_voltages_v: [5.0]
    max_current_ma: 500
  pcb:
    layers: 2
    width_mm: 55
    height_mm: 30
    min_trace_mm: 0.127
    min_space_mm: 0.127
    controlled_impedance: false

mechanical:
  enclosure: none
  selected_variant: bare_pcb
  variants:
    - {name: bare_pcb, lid_style: none, ventilation: none, gasket: false}
  mounting: host_product
  connectors_exposed: true
  vibration_environment: low
  cooling: passive
  envelope:
    board_width_mm: 55.0
    board_height_mm: 30.0
    board_thickness_mm: 1.6
    max_component_height_top_mm: 3.5
    max_component_height_bottom_mm: 1.0
  enclosure_internal_mm: [55.0, 30.0, 5.0]
  insertion_clearance_mm: 1.0
  assembly_clearance_mm: 0.5
  tolerance_mm: 0.2
  mounting_holes:
    - {x_mm: 2.5, y_mm: 2.5, diameter_mm: 2.2}
    - {x_mm: 52.5, y_mm: 2.5, diameter_mm: 2.2}
    - {x_mm: 2.5, y_mm: 27.5, diameter_mm: 2.2}
    - {x_mm: 52.5, y_mm: 27.5, diameter_mm: 2.2}

firmware:
  rtos: bare_metal
  zephyr_target: null
  avr_target: atmega32u4
  toolchain: avr-gcc
  frameworks: [lufa, qmk_optional]
  modules:
    - id: hid_descriptor
      description: USB HID report descriptor for keyboard + consumer control + gamepad
    - id: usb_stack
      description: LUFA USB middleware stack with HID class driver
    - id: key_matrix
      description: Debounced key matrix scan up to 20×4 keys
    - id: adc_analog
      description: ADC polling for analog axes (thumbstick, pedal inputs)
  ota: false

manufacturing:
  pcb:
    profile: jlcpcb_2layer
    layers: 2
    min_clearance_mm: 0.127
    min_track_width_mm: 0.127

safety:
  regulatory: [CE, FCC_B]
  isolation_required: false
  esd_protection: required

sourcing:
  provider: curated
  target_unit_cost_usd: 6.50
  volume: 250
  lead_time_weeks: 3

test_plan:
  gate_checks:
    - usb_enumeration_hid
    - key_matrix_scan
    - icsp_flash_erase_program
    - hid_report_latency_under_1ms

requirements:
  performance:
    - id: REQ-01
      text: HID report latency ≤ 1 ms at 1000 Hz polling rate
    - id: REQ-02
      text: Key matrix scan cycle ≤ 500 µs for 80-key matrix
  reliability:
    - id: REQ-03
      text: No missed keystrokes at sustained 6-key rollover
