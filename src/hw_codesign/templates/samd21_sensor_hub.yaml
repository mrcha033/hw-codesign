project:
  name: samd21_sensor_hub
  target_use: usb_sensor_hub
  revision: r1
  description: ATSAMD21G18A multi-sensor hub — LSM6DSOX IMU + BME280 env sensor + USB-C + native SWD
  version: 0.1.0
  template: samd21_sensor_hub
  created_at: '2026-06-21'

system:
  target_application: Wearable sensor node, data logger, IMU reference board, Arduino-Zero-compatible custom board
  supply:
    battery:
      type: usb_bus_powered
      pack_voltage_nominal: 5.0
      pack_voltage_max: 5.25
      pack_current_peak_a: 0.25
    rails:
      - {name: USB_VBUS, voltage: 5.0, current_peak_a: 0.25}
      - {name: V3V3, voltage: 3.3, current_peak_a: 0.15}

compute:
  mcu:
    family: SAMD21
    variant: ATSAMD21G18A-AU
    clock_mhz: 48
    cores: 1
    flash_kb: 256
    sram_kb: 32
    fpu: false
    connectivity: [usb_fullspeed_native, i2c, spi, uart]
    hard_realtime_required: false
  debug_interface: SWD

actuation:
  motor_channels: 0
  motor_channel_peak_current_a: 0.0
  gpio_outputs: 22
  pwm_channels: 8

sensing:
  imu:
    ic: LSM6DSOX
    interface: I2C
    axes: 6
    accel_range_g: [2, 4, 8, 16]
    gyro_range_dps: [125, 250, 500, 1000, 2000]
  environment:
    ic: BME280
    interface: I2C
    measures: [temperature, humidity, pressure]
  adc_channels: 10
  adc_bits: 12
  e_stop: not_required

assumptions:
  dfll_usb_clock:
    value: dfll96m_locked_to_32768hz_crystal
    resolved_value: dfll96m_locked_to_32768hz_crystal
    confidence: high
    reason: SAMD21 USB peripheral requires precise 48MHz; DFLL from external 32.768kHz achieves USB Full Speed clock tolerance.
    critical: true
    requires_user_review: false
  shared_i2c_bus:
    value: sercom3_pa22_pa23_lsm6dsox_0x6a_bme280_0x76
    resolved_value: sercom3_pa22_pa23_lsm6dsox_0x6a_bme280_0x76
    confidence: high
    reason: LSM6DSOX and BME280 default I2C addresses do not collide, and both support 400kHz fast mode.
    critical: true
    requires_user_review: false
  native_usb_phy:
    value: pa24_pa25_with_usb_esd_and_no_external_pullup
    resolved_value: pa24_pa25_with_usb_esd_and_no_external_pullup
    confidence: high
    reason: SAMD21 USB PHY has internal D+ pull-up; external protection is modeled by USBLC6-2SC6 on the raw connector pair.
    critical: true
    requires_user_review: false
  swd_debug:
    value: pa30_pa31_10pin_cortex_debug_header
    resolved_value: pa30_pa31_10pin_cortex_debug_header
    confidence: high
    reason: SAMD21 exposes standard ARM SWD for initial flash and bring-up over a keyed Cortex debug header.
    critical: true
    requires_user_review: false

electronics:
  backend: tscircuit
  role_set: samd21_sensor_hub
  compiled_backend_required: false
  power:
    input_voltage_min_v: 4.5
    input_voltage_max_v: 5.5
    input_connector: USB-C
    bus_voltages_v: [5.0, 3.3]
    max_current_ma: 250
  pcb:
    layers: 2
    width_mm: 50
    height_mm: 30
    min_trace_mm: 0.127
    min_space_mm: 0.127
    controlled_impedance: false

mechanical:
  enclosure: none
  selected_variant: bare_pcb
  variants:
    - {name: bare_pcb, lid_style: none, ventilation: none, gasket: false}
  mounting: host_product
  connectors_exposed: true
  vibration_environment: moderate
  cooling: passive
  envelope:
    board_width_mm: 50.0
    board_height_mm: 30.0
    board_thickness_mm: 1.6
    max_component_height_top_mm: 2.5
    max_component_height_bottom_mm: 1.0
  enclosure_internal_mm: [54.0, 34.0, 8.0]
  wall_thickness_mm: 2.0
  insertion_clearance_mm: 1.0
  assembly_clearance_mm: 0.6
  tolerance_mm: 0.2
  max_connector_edge_distance_mm: 6.0
  default_component_height_mm: 2.0
  component_heights_mm: {J1: 3.4, J2: 5.0, U3: 1.0, U4: 1.0}
  board_origin_mm: [0.0, 0.0, 0.0]
  mounting_holes:
    - {x_mm: 2.5, y_mm: 2.5, diameter_mm: 2.2}
    - {x_mm: 47.5, y_mm: 2.5, diameter_mm: 2.2}
    - {x_mm: 2.5, y_mm: 27.5, diameter_mm: 2.2}
    - {x_mm: 37.5, y_mm: 27.5, diameter_mm: 2.2}
  fixtures:
    mounting_plate: {enabled: false}
    frame_brackets: {enabled: false}
  connector_interfaces:
    - {ref: J1, side: front, opening_mm: [9.0, 4.0], center_z_mm: 2.5, position_tolerance_mm: 0.5}
    - {ref: J2, side: right, opening_mm: [13.0, 5.0], center_z_mm: 2.5, position_tolerance_mm: 0.5}

firmware:
  framework: zephyr
  target: atmel_samd21g18a
  outputs: [devicetree_overlay, pinmap, driver_stubs, bringup_tests]
  rtos: bare_metal
  zephyr_target: atmel_samd21g18a
  toolchain: arm-none-eabi-gcc
  frameworks: [arduino_samd, zephyr_samd21]
  modules:
    - id: usb_cdc
      behavior: interface_stack
      stack: usb
      library: zephyr_usb_cdc_acm
      required_nets: [USB_DP, USB_DM]
      required_tests: [usb_cdc_enumeration]
      init_order: 20
      stack_size_bytes: 2048
      description: USB CDC-ACM serial for host data streaming and configuration
    - id: lsm6dsox_driver
      behavior: sensor_poll
      bus: i2c
      sensor: lsm6dsox
      address: 0x6A
      poll_interval_ms: 1
      ring_buf_entries: 32
      description: I2C driver for LSM6DSOX with FIFO batching and INT1 interrupt
    - id: bme280_driver
      behavior: sensor_poll
      bus: i2c
      sensor: bme280
      address: 0x76
      poll_interval_ms: 1000
      ring_buf_entries: 4
      description: I2C driver for BME280 with forced mode and oversampling config
    - id: data_streamer
      behavior: interface_stack
      stack: usb
      library: zephyr_usb_cdc_acm
      required_nets: [USB_DP, USB_DM]
      required_tests: [sensor_data_streaming_1khz]
      init_order: 60
      stack_size_bytes: 2048
      description: Binary packet protocol streaming sensor data to USB CDC host at configurable rate
  ota: false

manufacturing:
  pcb:
    profile: jlcpcb_2layer
    layers: 2
    min_clearance_mm: 0.15
    min_track_width_mm: 0.15
    controlled_impedance: not_required
  mechanical:
    min_wall_thickness_mm: 1.6
  exports: [gerber, drill, bom, pick_and_place, schematic_pdf]

safety:
  regulatory: [CE]
  isolation_required: false
  esd_protection: required
  emergency_stop:
    required: false
    fail_safe_hardware_path: false
  required_protections: [usb_esd, watchdog]

sourcing:
  provider: curated
  target_unit_cost_usd: 8.00
  volume: 200
  lead_time_weeks: 3

test_plan:
  gate_checks:
    - usb_cdc_enumeration
    - lsm6dsox_i2c_whoami
    - bme280_i2c_whoami
    - swd_debug_attach
    - sensor_data_streaming_1khz

requirements:
  raw_inputs: []
  active_lowered:
    - {id: req_lowered_0001, source: template:samd21_sensor_hub, spec_path: sensing.imu, status: lowered}
    - {id: req_lowered_0002, source: template:samd21_sensor_hub, spec_path: firmware.modules.usb_cdc, status: lowered}
  active_unresolved:
    - id: req_unresolved_0001
      source: template:samd21_sensor_hub
      category: reliability_test_duration
      field_type: retained_assumption
      status: unresolved
      release_blocking: false
      reason: The 24-hour continuous acquisition target needs bench soak evidence before release, but it does not change the generated pin/package contract.
      required_human_approvals: [bringup_owner]
      affected_gates: [physical_qualification, firmware_modules]
