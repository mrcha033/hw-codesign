project:
  name: samd21_sensor_hub
  description: ATSAMD21G18A multi-sensor hub — LSM6DSOX IMU + BME280 env sensor + USB-C + native SWD
  version: 0.1.0
  template: samd21_sensor_hub
  created_at: '2026-06-21'

system:
  target_application: Wearable sensor node, data logger, IMU reference board, Arduino-Zero-compatible custom board

compute:
  mcu:
    family: SAMD21
    variant: ATSAMD21G18A-AU
    clock_mhz: 48
    cores: 1
    flash_kb: 256
    sram_kb: 32
    fpu: false
    connectivity: [usb_fullspeed_native, i2c, spi, uart]
    hard_realtime_required: false
  debug_interface: SWD

actuation:
  motor_channels: 0
  gpio_outputs: 22
  pwm_channels: 8

sensing:
  imu:
    ic: LSM6DSOX
    interface: I2C
    axes: 6
    accel_range_g: [2, 4, 8, 16]
    gyro_range_dps: [125, 250, 500, 1000, 2000]
  environment:
    ic: BME280
    interface: I2C
    measures: [temperature, humidity, pressure]
  adc_channels: 10
  adc_bits: 12

assumptions:
  - id: ASM-01
    text: DFLL96M locked to 32.768kHz crystal generates 48MHz for USB FS and core clock
    rationale: SAMD21 USB peripheral requires precise 48MHz; DFLL from external 32.768kHz achieves ±50ppm within USB spec
  - id: ASM-02
    text: LSM6DSOX and BME280 share I2C bus (SERCOM3 PA22/PA23); addresses 0x6A and 0x76 respectively
    rationale: No address collision on default config; both devices support I2C fast mode 400kHz
  - id: ASM-03
    text: USB D+/D- on PA24/PA25 fixed pins with 27Ω series resistors and no external pull-ups
    rationale: SAMD21 USB PHY has internal pull-ups on D+; series resistors required per USB signal integrity spec
  - id: ASM-04
    text: SWD on PA30/PA31 with 10-pin Cortex debug header for J-Link or DAPLink
    rationale: SAMD21 boot ROM includes standard Cortex-M SWD debug; no bootloader required for initial flash

electronics:
  backend: tscircuit
  role_set: samd21_sensor_hub
  compiled_backend_required: false
  power:
    input_voltage_min_v: 4.5
    input_voltage_max_v: 5.5
    input_connector: USB-C
    bus_voltages_v: [5.0, 3.3]
    max_current_ma: 250
  pcb:
    layers: 2
    width_mm: 50
    height_mm: 30
    min_trace_mm: 0.127
    min_space_mm: 0.127
    controlled_impedance: false

mechanical:
  enclosure: none
  selected_variant: bare_pcb
  variants:
    - {name: bare_pcb, lid_style: none, ventilation: none, gasket: false}
  mounting: host_product
  connectors_exposed: true
  vibration_environment: moderate
  cooling: passive
  envelope:
    board_width_mm: 50.0
    board_height_mm: 30.0
    board_thickness_mm: 1.6
    max_component_height_top_mm: 2.5
    max_component_height_bottom_mm: 1.0
  enclosure_internal_mm: [50.0, 30.0, 5.0]

firmware:
  rtos: bare_metal
  zephyr_target: atmel_samd21g18a
  toolchain: arm-none-eabi-gcc
  frameworks: [arduino_samd, zephyr_samd21]
  modules:
    - id: usb_cdc
      description: USB CDC-ACM serial for host data streaming and configuration
    - id: lsm6dsox_driver
      description: I2C driver for LSM6DSOX with FIFO batching and INT1 interrupt
    - id: bme280_driver
      description: I2C driver for BME280 with forced mode and oversampling config
    - id: data_streamer
      description: Binary packet protocol streaming sensor data to USB CDC host at configurable rate
  ota: false

manufacturing:
  pcb:
    profile: jlcpcb_2layer
    layers: 2
    min_clearance_mm: 0.127
    min_track_width_mm: 0.127

safety:
  regulatory: [CE]
  isolation_required: false
  esd_protection: required

sourcing:
  provider: curated
  target_unit_cost_usd: 8.00
  volume: 200
  lead_time_weeks: 3

test_plan:
  gate_checks:
    - usb_cdc_enumeration
    - lsm6dsox_i2c_whoami
    - bme280_i2c_whoami
    - swd_debug_attach
    - sensor_data_streaming_1khz

requirements:
  performance:
    - id: REQ-01
      text: IMU data rate ≥ 1 kHz (LSM6DSOX FIFO mode)
    - id: REQ-02
      text: USB CDC streaming latency ≤ 5 ms
  reliability:
    - id: REQ-03
      text: Continuous sensor acquisition ≥ 24 hours without reset
