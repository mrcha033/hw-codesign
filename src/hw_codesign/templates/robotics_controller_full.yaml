project:
  target_use: rideable_or_mobile_robot
  revision: r1
  template: robotics_controller_full
electronics:
  backend: reference
  role_set: robotics_controller
  compiled_backend_required: true
sourcing:
  provider: curated
system:
  supply:
    battery:
      type: li_ion_or_lipo
      pack_voltage_nominal: 24.0
      pack_voltage_max: 29.4
      pack_current_peak_a: 80.0
    rails:
      - {name: VBAT, voltage_min: 18.0, voltage_max: 29.4, current_peak_a: 80.0}
      - {name: V5, voltage: 5.0, current_peak_a: 5.0}
      - {name: V3V3, voltage: 3.3, current_peak_a: 2.0}
compute:
  mcu:
    family: STM32H7
    hard_realtime_required: true
  companion:
    optional: true
    candidates: [RaspberryPi_CM4, Jetson_Orin_Nano]
actuation:
  motor_channels: 12
  motor_type: unspecified
  motor_channel_peak_current_a: 8.0
  feedback: {encoder: required, current_sense: required}
sensing:
  imu: required
  battery_monitor: required
  current_monitor: required
  temperature_monitor: required
  e_stop: required
mechanical:
  enclosure: required
  selected_variant: sealed
  variants:
    - {name: sealed, lid_style: screw, ventilation: none, gasket: true}
    - {name: vented, lid_style: screw, ventilation: side_slots, gasket: false}
    - {name: service, lid_style: snap, ventilation: top_slots, gasket: false}
  mounting: robot_frame
  connectors_exposed: true
  vibration_environment: high
  cooling: unspecified
  envelope:
    board_width_mm: 160.0
    board_height_mm: 100.0
    board_thickness_mm: 1.6
    max_component_height_top_mm: 18.0
    max_component_height_bottom_mm: 3.0
  enclosure_internal_mm: [166.0, 106.0, 28.0]
  wall_thickness_mm: 2.4
  insertion_clearance_mm: 2.0
  assembly_clearance_mm: 1.0
  tolerance_mm: 0.25
  max_connector_edge_distance_mm: 6.0
  default_component_height_mm: 4.0
  component_heights_mm: {J1: 12.0, J2: 13.0, J3: 11.0, J5: 8.0, J11: 12.0, J17: 12.0, U1: 2.0, U4: 4.0, U5: 4.0}
  board_origin_mm: [3.0, 3.0, 6.4]
  mounting_holes:
    - {x_mm: 6.0, y_mm: 6.0, diameter_mm: 3.2}
    - {x_mm: 154.0, y_mm: 6.0, diameter_mm: 3.2}
    - {x_mm: 6.0, y_mm: 94.0, diameter_mm: 3.2}
    - {x_mm: 154.0, y_mm: 94.0, diameter_mm: 3.2}
  fixtures:
    mounting_plate: {enabled: true, thickness_mm: 3.0, edge_margin_mm: 8.0}
    frame_brackets: {enabled: true, thickness_mm: 3.0, width_mm: 18.0, height_mm: 20.0}
  connector_interfaces:
    - {ref: J1, side: front, opening_mm: [14.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J3, side: front, opening_mm: [12.0, 9.0], center_z_mm: 10.5, position_tolerance_mm: 0.5}
    - {ref: J5, side: rear, opening_mm: [12.0, 8.0], center_z_mm: 9.5, position_tolerance_mm: 0.5}
    - {ref: J2, side: rear, opening_mm: [14.0, 11.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J11, side: left, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J12, side: left, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J13, side: left, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J14, side: left, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J15, side: left, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J16, side: left, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J17, side: right, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J18, side: right, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J19, side: right, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J20, side: right, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J21, side: right, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
    - {ref: J22, side: right, opening_mm: [12.0, 10.0], center_z_mm: 11.0, position_tolerance_mm: 0.5}
firmware:
  framework: zephyr
  target: stm32h7
  outputs: [devicetree_overlay, pinmap, board_definition, driver_stubs, bringup_tests]
manufacturing:
  pcb:
    profile: jlcpcb_4layer
    layers: 4
    min_clearance_mm: 0.15
    min_track_width_mm: 0.15
    controlled_impedance: optional
  mechanical:
    min_wall_thickness_mm: 1.6
  exports: [gerber, drill, bom, pick_and_place, step, schematic_pdf, assembly_drawing]
safety:
  emergency_stop:
    required: true
    fail_safe_hardware_path: true
  required_protections: [reverse_polarity, fuse_or_efuse, tvs, watchdog, motor_enable_gate]
assumptions:
  motor_type:
    value: external_driver_modules
    confidence: low
    reason: Exact motor topology was not specified.
    critical: true
    requires_user_review: true
  cooling:
    value: forced_air_recommended
    confidence: low
    reason: Thermal behavior requires load testing and enclosure airflow data.
    critical: true
    requires_user_review: true
  connector_current_rating:
    value_a: 10.0
    confidence: medium
    reason: Conservative per-channel default pending connector selection.
    critical: true
    requires_user_review: true
requirements:
  raw_inputs: []
  active_lowered: []
  active_unresolved: []
