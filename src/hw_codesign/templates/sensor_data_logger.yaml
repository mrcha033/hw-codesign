project:
  target_use: iot_sensor_gateway
  revision: r1
  template: sensor_data_logger
electronics:
  backend: tscircuit
  role_set: sensor_data_logger
  compiled_backend_required: true
sourcing:
  provider: curated
system:
  supply:
    battery:
      type: usb_pd
      pack_voltage_nominal: 5.0
      pack_voltage_max: 5.25
      pack_current_peak_a: 0.9
    rails:
      - {name: V5, voltage: 5.0, current_peak_a: 0.9}
      - {name: V3V3, voltage: 3.3, current_peak_a: 0.5}
compute:
  mcu:
    family: ESP32S3
    hard_realtime_required: false
actuation:
  motor_channels: 0
  motor_channel_peak_current_a: 0.0
sensing:
  imu: required
  battery_monitor: not_required
  current_monitor: not_required
  temperature_monitor: required
  e_stop: not_required
mechanical:
  enclosure: optional
  selected_variant: desktop
  variants:
    - {name: desktop, lid_style: snap, ventilation: side_slots, gasket: false}
  mounting: desktop
  connectors_exposed: true
  vibration_environment: low
  cooling: passive
  envelope:
    board_width_mm: 70.0
    board_height_mm: 50.0
    board_thickness_mm: 1.6
    max_component_height_top_mm: 10.0
    max_component_height_bottom_mm: 2.0
  enclosure_internal_mm: [76.0, 56.0, 18.0]
  wall_thickness_mm: 2.0
  insertion_clearance_mm: 1.5
  assembly_clearance_mm: 0.8
  tolerance_mm: 0.2
  max_connector_edge_distance_mm: 5.0
  default_component_height_mm: 3.0
  component_heights_mm: {J1: 7.0, U1: 2.5}
  board_origin_mm: [3.0, 3.0, 3.2]
  mounting_holes:
    - {x_mm: 4.0, y_mm: 4.0, diameter_mm: 3.2}
    - {x_mm: 66.0, y_mm: 4.0, diameter_mm: 3.2}
    - {x_mm: 4.0, y_mm: 46.0, diameter_mm: 3.2}
    - {x_mm: 66.0, y_mm: 46.0, diameter_mm: 3.2}
  fixtures:
    mounting_plate: {enabled: false}
    frame_brackets: {enabled: false}
  connector_interfaces:
    - {ref: J1, side: front, opening_mm: [10.0, 7.0], center_z_mm: 8.0, position_tolerance_mm: 0.5}
firmware:
  framework: zephyr
  target: esp32s3
  outputs: [devicetree_overlay, pinmap, driver_stubs, bringup_tests]
manufacturing:
  pcb:
    profile: jlcpcb_2layer
    layers: 2
    min_clearance_mm: 0.15
    min_track_width_mm: 0.15
    controlled_impedance: not_required
  mechanical:
    min_wall_thickness_mm: 1.6
  exports: [gerber, drill, bom, pick_and_place, schematic_pdf]
safety:
  emergency_stop:
    required: false
    fail_safe_hardware_path: false
  required_protections: [reverse_polarity, fuse_or_efuse, tvs, watchdog]
assumptions:
  rf_antenna_clearance:
    value: module_integral_antenna
    confidence: medium
    reason: ESP32-S3-WROOM-1 has an integrated PCB antenna; a keep-out zone on the top copper layer is required per Espressif layout guidelines.
    critical: true
    requires_user_review: true
  power_budget:
    value: usb_500ma_default
    confidence: medium
    reason: USB 2.0 host provides 500 mA by default; USB-PD negotiation for higher current is not modelled.
    critical: false
    requires_user_review: false
requirements:
  raw_inputs: []
  active_lowered: []
  active_unresolved: []
