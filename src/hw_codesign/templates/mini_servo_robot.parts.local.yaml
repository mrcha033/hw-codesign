version: 1
roles:
  servo_fuse: {component_id: project_servo_fuse_10a, resolution: project_owned, rationale: Fused 2S battery input sized for the declared 10 A peak path}
  servo_power_buck: {component_id: project_d24v90f5, resolution: project_owned, rationale: Off-board 5 V 9 A module keeps high-loss conversion away from the MCU and IMU}
  servo_bulk_cap: {component_id: project_servo_bulk_1000uf, resolution: project_owned, rationale: Local bulk energy at the six-servo connector bank}
  servo_pwm_controller: {component_id: project_pca9685pw, resolution: project_owned, rationale: Six channels use a reviewed subset of the 16-channel PWM controller}
  servo_output_header: {component_id: project_servo_header_3pin, resolution: project_owned, rationale: "Standard signal, 5 V, and ground servo interface"}

components:
  - id: project_servo_fuse_10a
    role: servo_fuse
    mpn: 0451010.MRL
    manufacturer: Littelfuse
    package: MINI-BLADE-HOLDER
    symbol: {library_id: Device:Fuse, verified: true, expected_pins: ['1', '2']}
    footprint: {library_id: Project:MiniBladeFuse_10A, verified: true, expected_pads: ['1', '2']}
    pins:
      - {number: '1', name: IN, electrical_type: power_in, voltage_domain: VBAT, current_limit_a: 10.0}
      - {number: '2', name: OUT, electrical_type: power_out, voltage_domain: VBAT, current_limit_a: 10.0}
    electrical_ratings: {supply_voltage_min_v: 0.0, supply_voltage_max_v: 32.0, current_continuous_a: 10.0, current_peak_a: 20.0}
    mechanical: {body_mm: [19.0, 6.0], height_mm: 8.0, model: null, mounting_holes: []}
    validation:
      status: approved
      reviewer: template_maintainer
      reviewed_at: '2026-07-14'
      rules:
        - {id: fuse_pin_contract, kind: pin_contract, status: pass, constraint: IN and OUT match the reviewed holder pad numbering, evidence: [manufacturer_drawing]}
        - {id: fuse_rating, kind: electrical_rating, status: pass, constraint: 10 A continuous prototype path with 32 V holder rating, evidence: [manufacturer_datasheet]}
        - {id: fuse_footprint, kind: footprint, status: pass, constraint: Holder pad spacing and courtyard match the mechanical drawing, evidence: [footprint_review]}
        - {id: fuse_body, kind: mechanical, status: pass, constraint: Body and service-access envelope are represented, evidence: [manufacturer_drawing]}
    lifecycle: active
    sourcing:
      status: waived
      supplier_skus: []
      waiver: {reason: Project selects the fuse holder during prototype procurement, risk: Holder substitutions change footprint and interruption rating, mitigation: Verify MPN and installed fuse value at receiving inspection, approved_by: template_maintainer, approved_at: '2026-07-14', required_reviews: [incoming_inspection]}
    constraints: [ten_amp_servo_fuse, service_access_required]
    review_status: approved

  - id: project_d24v90f5
    role: servo_power_buck
    mpn: D24V90F5
    manufacturer: Pololu
    package: POWER-MODULE-4PIN
    symbol: {library_id: Project:D24V90F5, verified: true, expected_pins: ['1', '2', '3', '4']}
    footprint: {library_id: Project:Pololu_D24V90F5, verified: true, expected_pads: ['1', '2', '3', '4']}
    pins:
      - {number: '1', name: VIN, electrical_type: power_in, voltage_domain: VBAT, current_limit_a: 10.0}
      - {number: '2', name: GND, electrical_type: ground, voltage_domain: GND, current_limit_a: 10.0}
      - {number: '3', name: VOUT, electrical_type: power_out, voltage_domain: V5, current_limit_a: 9.0}
      - {number: '4', name: EN, electrical_type: input, voltage_domain: V3V3, current_limit_a: 0.01}
    electrical_ratings: {supply_voltage_min_v: 6.0, supply_voltage_max_v: 38.0, current_continuous_a: 9.0, current_peak_a: 12.0}
    mechanical: {body_mm: [43.0, 31.0], height_mm: 12.0, model: null, mounting_holes: []}
    validation:
      status: approved
      reviewer: template_maintainer
      reviewed_at: '2026-07-14'
      rules:
        - {id: buck_pin_contract, kind: pin_contract, status: pass, constraint: VIN GND VOUT EN match the reviewed carrier drawing, evidence: [manufacturer_product_page]}
        - {id: buck_rating, kind: electrical_rating, status: pass, constraint: 2S LiPo input and declared servo current remain within module limits, evidence: [manufacturer_product_page]}
        - {id: buck_footprint, kind: footprint, status: pass, constraint: Module header and keepout dimensions match the carrier drawing, evidence: [footprint_review]}
        - {id: buck_body, kind: mechanical, status: pass, constraint: Module body and thermal keepout are represented, evidence: [mechanical_drawing]}
    lifecycle: active
    sourcing:
      status: waived
      supplier_skus: []
      waiver: {reason: Complete module is project-procured rather than centrally stocked, risk: Module revision or counterfeit may change current capability, mitigation: Verify label dimensions no-load output and loaded droop before assembly, approved_by: template_maintainer, approved_at: '2026-07-14', required_reviews: [incoming_inspection, load_test]}
    constraints: [thermal_keepout_20mm_from_imu, airflow_required, hardware_enable_required]
    review_status: approved

