    mechanical: {body_mm: [10.0, 10.0], height_mm: 13.0, model: null, mounting_holes: []}
    validation:
      status: approved
      reviewer: template_maintainer
      reviewed_at: '2026-07-14'
      rules:
        - {id: bulk_pin_contract, kind: pin_contract, status: pass, constraint: Positive and negative pads match the polarized capacitor drawing, evidence: [manufacturer_datasheet]}
        - {id: bulk_rating, kind: electrical_rating, status: pass, constraint: 10 V rating exceeds the 5 V servo rail, evidence: [manufacturer_datasheet]}
        - {id: bulk_footprint, kind: footprint, status: pass, constraint: 5 mm lead pitch and polarity marking are reviewed, evidence: [footprint_review]}
        - {id: bulk_body, kind: mechanical, status: pass, constraint: Diameter and height are included in the enclosure contract, evidence: [manufacturer_datasheet]}
    lifecycle: active
    sourcing:
      status: waived
      supplier_skus: []
