system:
  supply:
    battery:
      type: li_ion_or_lipo
      pack_voltage_nominal: 24.0
      pack_voltage_max: 29.4
      pack_current_peak_a: 80.0
    rails:
    - name: VBAT
      voltage_min: 18.0
      voltage_max: 29.4
      current_peak_a: 80.0
    - name: V5
      voltage: 5.0
      current_peak_a: 5.0
    - name: V3V3
      voltage: 3.3
      current_peak_a: 2.0
electronics:
  backend: reference
  role_set: robotics_controller
  compiled_backend_required: true
compute:
  mcu:
    family: STM32H7
    hard_realtime_required: true
  companion:
    optional: true
    candidates:
    - RaspberryPi_CM4
    - Jetson_Orin_Nano
actuation:
  motor_channels: 12
  motor_type: unspecified
  motor_channel_peak_current_a: 8.0
  feedback:
    encoder: required
    current_sense: required
  max_simultaneous_peak_channels: 10
sensing:
  imu: required
  battery_monitor: required
  current_monitor: required
  temperature_monitor: required
  e_stop: required
assumptions:
  motor_type:
    value: external_driver_modules
    confidence: low
    reason: Exact motor topology was not specified.
    critical: false
    requires_user_review: false
    resolved_value: external_driver_modules
    resolution_basis: Reference backend conservative design basis; retained in known
      risks
  cooling:
    value: forced_air_recommended
    confidence: low
    reason: Thermal behavior requires load testing and enclosure airflow data.
    critical: false
    requires_user_review: false
    resolved_value: forced_air_recommended
    resolution_basis: Reference backend conservative design basis; retained in known
      risks
  connector_current_rating:
    value_a: 10.0
    confidence: medium
    reason: Conservative per-channel default pending connector selection.
    critical: false
    requires_user_review: false
    resolved_value: signal_and_low_current_io_only
    resolution_basis: Reference backend conservative design basis; retained in known
      risks
