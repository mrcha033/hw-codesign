requirements:
  raw_inputs:
  - id: req_input_0001
    text: 'Create a candidate for the existing sensor_data_logger template as a 70
      x 50 mm, 2-layer USB-powered ESP32-S3 environmental sensor gateway. Preserve
      the current system intent: 5 V USB input with protected 3.3 V rail, required
      IMU and temperature sensing, Zephyr firmware outputs for devicetree/pinmap/driver
      stubs/bring-up tests, desktop enclosure geometry, exposed front USB connector,
      passive cooling, and the existing required protections (reverse polarity, fuse
      or e-fuse, TVS, watchdog). Do not resolve the existing critical RF antenna-clearance
      assumption without user approval.'
    created_by: user
  - id: req_input_0002
    text: 'Generate a cross-domain candidate from the current sensor_data_logger specification:
      ESP32-S3 USB environmental sensor gateway with required IMU and temperature
      sensing, protected 5 V to 3.3 V power, Zephyr firmware outputs, 70 x 50 mm 2-layer
      PCB, desktop enclosure, passive cooling, exposed front connector, and current
      safety protections. Preserve unresolved assumptions and report evidence-backed
      gates.'
