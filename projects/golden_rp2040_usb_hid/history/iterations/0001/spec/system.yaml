system:
  target_application: USB HID device, USB CDC-ACM adapter, embedded USB peripheral,
    RP2040 custom board
  supply:
    battery:
      type: usb_bus_powered
      pack_voltage_nominal: 5.0
      pack_voltage_max: 5.25
      pack_current_peak_a: 0.5
    rails:
    - name: USB_VBUS
      voltage: 5.0
      current_peak_a: 0.5
    - name: V3V3
      voltage: 3.3
      current_peak_a: 0.3
    - name: V1V1
      voltage: 1.1
      current_peak_a: 0.15
compute:
  mcu:
    family: RP2040
    variant: RP2040
    clock_mhz: 133
    cores: 2
    flash_mb: 2
    sram_kb: 264
    fpu: false
    connectivity:
    - usb_fullspeed_native
    - spi
    - i2c
    - uart
    - pio
    hard_realtime_required: false
  debug_interface: SWD
actuation:
  motor_channels: 0
  motor_channel_peak_current_a: 0.0
  gpio_outputs: 26
  pwm_channels: 16
sensing:
  imu: not_required
  e_stop: not_required
  battery_monitor: not_required
  current_monitor: not_required
  temperature_monitor: not_required
  adc_channels: 4
  adc_bits: 12
assumptions:
  external_qspi_flash:
    value: w25q16jv_2mb
    confidence: high
    reason: RP2040 boots through execute-in-place from external QSPI flash; the candidate
      uses a 2 MB W25Q16JV.
    critical: false
    requires_user_review: false
  usb_bus_power:
    value: usb_c_5v_to_ap2112k_3v3
    confidence: high
    reason: USB-C VBUS supplies 5 V and the AP2112K supplies the board 3.3 V rail.
    critical: false
    requires_user_review: false
  crystal_accuracy:
    value: abm8_272_t3_12mhz_15pf_load
    confidence: high
    reason: The candidate uses the Raspberry Pi reference-design ABM8-272-T3 12 MHz
      crystal with two 15 pF load capacitors and a 1 kOhm damping resistor.
    critical: false
    requires_user_review: false
  optional_pio_interfaces:
    value: firmware_defined
    confidence: medium
    reason: Optional PIO protocols are outside the golden-board bring-up scope and
      require dedicated firmware tests when enabled.
    critical: false
    requires_user_review: false
electronics:
  backend: tscircuit
  role_set: rp2040_usb_device
  compiled_backend_required: false
  power:
    input_voltage_min_v: 4.5
    input_voltage_max_v: 5.5
    input_connector: USB-C
    bus_voltages_v:
    - 5.0
    - 3.3
    - 1.1
    max_current_ma: 500
  pcb:
    layers: 2
    width_mm: 65
    height_mm: 30
    min_trace_mm: 0.15
    min_space_mm: 0.15
    controlled_impedance: true
    usb_differential_pair:
      target_differential_impedance_ohms: 90
      trace_width_mm: 0.8
      pair_gap_mm: 0.15
      reference_plane: continuous_ground
      stackup_basis: 1.0_mm_two_layer_reference_only
