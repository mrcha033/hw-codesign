firmware:
  framework: zephyr
  target: atmel_samd21g18a
  outputs:
  - devicetree_overlay
  - pinmap
  - driver_stubs
  - bringup_tests
  rtos: bare_metal
  zephyr_target: atmel_samd21g18a
  toolchain: arm-none-eabi-gcc
  frameworks:
  - arduino_samd
  - zephyr_samd21
  modules:
  - id: usb_cdc
    behavior: interface_stack
    stack: usb
    library: zephyr_usb_cdc_acm
    required_nets:
    - USB_DP
    - USB_DM
    required_tests:
    - usb_cdc_enumeration
    init_order: 20
    stack_size_bytes: 2048
    description: USB CDC-ACM serial for host data streaming and configuration
  - id: bme280_driver
    behavior: sensor_poll
    bus: i2c
    sensor: bme280
    address: 118
    poll_interval_ms: 1000
    ring_buf_entries: 4
    description: I2C driver for BME280 with forced mode and oversampling config
  - id: data_streamer
    behavior: interface_stack
    stack: usb
    library: zephyr_usb_cdc_acm
    required_nets:
    - USB_DP
    - USB_DM
    required_tests:
    - sensor_data_streaming_1khz
    init_order: 60
    stack_size_bytes: 2048
    description: Binary packet protocol streaming sensor data to USB CDC host at configurable
      rate
  - id: biped_motion_state
    behavior: state_machine
    initial_state: DISARMED
    states:
    - name: DISARMED
      entry: servo power disabled
    - name: CALIBRATE
      entry: load and verify servo centers
    - name: STAND
      entry: ramp to neutral standing pose
    - name: WALK_FORWARD
      entry: start phased gait
    - name: TURN_LEFT
      entry: start left turn gait
    - name: TURN_RIGHT
      entry: start right turn gait
    - name: STOP
      entry: finish step and hold neutral
    - name: FALLEN
      entry: disable gait and servo torque
    - name: FAULT
      entry: latch fault and disable servo power
    transitions:
    - from: DISARMED
      to: CALIBRATE
      trigger: calibrate
    - from: CALIBRATE
      to: STAND
      trigger: calibration_ok
    - from: STAND
      to: WALK_FORWARD
      trigger: walk
    - from: STAND
      to: TURN_LEFT
      trigger: turn_left
    - from: STAND
      to: TURN_RIGHT
      trigger: turn_right
    - from: WALK_FORWARD
      to: STOP
      trigger: stop
    - from: TURN_LEFT
      to: STOP
      trigger: stop
    - from: TURN_RIGHT
      to: STOP
      trigger: stop
    - from: STOP
      to: STAND
      trigger: settled
    - from: STAND
      to: FALLEN
      trigger: fall_detected
    - from: WALK_FORWARD
      to: FALLEN
      trigger: fall_detected
    - from: FALLEN
      to: DISARMED
      trigger: reset
    - from: DISARMED
      to: FAULT
      trigger: fault
    - from: STAND
      to: FAULT
      trigger: fault
    - from: WALK_FORWARD
      to: FAULT
      trigger: fault
    - from: FAULT
      to: DISARMED
      trigger: reset
  - id: lsm6dsox_driver
    behavior: sensor_poll
    bus: i2c
    sensor: lsm6dsox
    address: '0x6A'
    poll_interval_ms: 5
    ring_buf_entries: 64
    description: 200 Hz IMU sample path
  - id: pca9685_servo_pwm
    behavior: interface_stack
    stack: i2c_pwm
    library: zephyr_i2c_pca9685
    required_nets:
    - I2C_SCL
    - I2C_SDA
    - SERVO_PWM_OE
    required_tests:
    - pca9685_probe
    - servo_neutral_pulse_scope
    - all_channels_power_off_safe
    init_order: 45
    stack_size_bytes: 1536
  - id: servo_safety_watchdog
    behavior: timeout_shutdown
    trigger:
      signal: IMU_INT1
      timeout_ms: 100
    action:
      disable_all: servo_power_and_pwm
      assert: SERVO_PWM_OE
    description: IMU heartbeat watchdog; hardware E-stop remains independent.
  ota: false
