name: avr_32u4_hid
critical_roles:
  - power_input
  - tvs
  - mcu
  - crystal_16m

roles:
  power_input: {component_id: usb4105_gf_a, resolution: curated}
  tvs: {component_id: usblc6_2sc6, resolution: curated}
  mcu: {component_id: atmega32u4_au, resolution: curated}
  crystal_16m: {component_id: abm8_16m, resolution: curated}
  xtal_cap: {component_id: grm216_22p, resolution: curated}
  capacitor_100n: {component_id: grm155_100n, resolution: curated}
  capacitor_10u_50v: {component_id: grm188_10u, resolution: curated}
  ucap: {component_id: grm188_1uf, resolution: curated}
  icsp_header: {component_id: conn_1x06_2p54, resolution: curated}
  hwb_pulldown: {component_id: rc0603_10k, resolution: curated}
  resistor_4k7: {component_id: rc0603_4k7, resolution: curated}

alternatives:
  mcu:
    - component_id: atmega32u4_mu
      resolution: registry_candidate
      rationale: QFN-44 package reduces PCB footprint by ~30%; same silicon die, same firmware; requires finer pitch soldering and stencil design review
      required_reviews: [assembly_process_review, footprint_contract]
      compatibility: {pin_numbers: exact, footprint: different, electrical_value: same}

single_source_justifications:
  mcu: {reason: ATmega32U4 substitution changes USB PHY, crystal requirements, pinmap, and firmware toolchain; LUFA/QMK compatibility must be re-verified, mitigation: Add curated AVR alternative with USB PHY and QMK compatibility evidence, required_reviews: [usb_phy, firmware_migration]}
