  regulator_5v: {component_id: lm22678tj_5v0, resolution: curated}
  regulator_3v3: {component_id: ap2112k_33trg1, resolution: curated}
  can: {component_id: tcan1042hgvdrq1, resolution: curated}
  motor_connector: {component_id: phoenix_1935174, resolution: curated}
  can_connector: {component_id: molex_43650_0300, resolution: curated}
