alternatives:
  half_bridge:
    - component_id: csd18532q5b
      resolution: registry_candidate
      rationale: Same VSON-8 footprint, 60V rating (vs 40V) for 6S LiPo; Rds(on) is slightly higher at 1.7 mΩ.
      required_reviews: [gate_drive_review, thermal_margin]
      compatibility: {pin_numbers: exact, footprint: exact, electrical_value: changed}
  gate_driver:
    - component_id: drv8323hrsgzt
      resolution: registry_candidate
      rationale: Hardware-version variant with hardware-pin current limit threshold instead of SPI-configurable; eliminates SPI dependency for protections at the cost of configurability.
      required_reviews: [current_limit_programming, firmware_impact]
      compatibility: {pin_numbers: exact, footprint: exact, electrical_value: changed}
single_source_justifications:
  power_input: {reason: Micro-Fit 2-pin substitution changes shell, current rating, and mating connector; upgrade to XT60 or equivalent for currents above 13 A, mitigation: Add a curated high-current connector alternative with current rating and mating evidence, required_reviews: [current_rating, mating_connector]}
  reverse_polarity: {reason: Ideal-diode controller alternatives change pinout and protection-loop behavior on the high-current input path, mitigation: Add a curated controller alternative with pin/package and reverse-battery behavior evidence before substitution, required_reviews: [protection_thresholds, pinout_contract]}
  tvs: {reason: TVS substitution changes clamp voltage, capacitance, and energy absorption; must remain above VBAT_MAX (29.4 V) and below FET breakdown (40 V), mitigation: Add a curated TVS alternative with clamping voltage evidence, required_reviews: [clamping_voltage, energy_rating]}
  mcu: {reason: STM32G474 substitution changes HRTIM availability, CORDIC/FMAC acceleration, pinmap, and FOC firmware, mitigation: Add a curated MCU alternative with advanced-timer and FOC-library evidence, required_reviews: [timer_resolution, firmware_migration]}
  gate_driver: {reason: DRV8323RS substitution changes gate drive strength, SPI configuration protocol, integrated current sense behavior, and protection thresholds, mitigation: Add a curated gate driver alternative with SPI map and current-sense evidence, required_reviews: [gate_drive_strength, spi_register_map]}
  half_bridge: {reason: CSD18540Q5B substitution changes Rds(on), gate charge, and thermal model — all affect FOC current control loop tuning, mitigation: Add a curated MOSFET alternative with Rds(on) and gate charge evidence for control loop re-tuning, required_reviews: [control_loop_tuning, thermal_model]}
  regulator_5v: {reason: LM22678 substitution changes inductor sizing, efficiency curve, and EMC behavior near gate drive switching frequencies, mitigation: Add a curated buck alternative with switching-frequency and EMC evidence, required_reviews: [inductor_design, emi_review]}
