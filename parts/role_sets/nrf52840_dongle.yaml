name: nrf52840_dongle
critical_roles:
  - power_input
  - tvs
  - regulator_3v3
  - mcu

roles:
  power_input: {component_id: usb4105_gf_a, resolution: curated}
  tvs: {component_id: usblc6_2sc6, resolution: curated}
  regulator_3v3: {component_id: ap2112k_33trg1, resolution: curated}
  mcu: {component_id: nrf52840_qiaa, resolution: curated}
  antenna_connector: {component_id: hirose_ufl_r_smt, resolution: curated}
  capacitor_100n: {component_id: grm155_100n, resolution: curated}
  capacitor_10u_50v: {component_id: grm188_10u, resolution: curated}
  resistor_4k7: {component_id: rc0603_4k7, resolution: curated}
  debug_header: {component_id: samtec_ftsh_105, resolution: curated}

alternatives:
  mcu:
    - component_id: nrf52840_qiaa
      resolution: curated
      rationale: nRF52840-QIAA is the sole package for bare-die nRF52840; no pin-compatible alternatives from Nordic; nRF5340 is a higher-capability successor requiring full redesign
      required_reviews: [nrf5340_migration_feasibility]
      compatibility: {pin_numbers: exact, footprint: exact, electrical_value: same}

single_source_justifications:
  nrf52840_qiaa: {reason: nRF52840 is Nordic Semiconductor proprietary silicon; BLE 5.3 + IEEE 802.15.4 combo on single die with no pin-compatible third-party alternative, mitigation: Qualify nRF52833 (smaller flash) or nRF5340 (dual-core successor) as migration targets; maintain 6-month inventory, required_reviews: [supply_chain_risk, nrf52833_peripheral_parity, nrf5340_usb_validation]}
