name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run ruff check src/ tests/

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          package-manager-cache: true
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install KiCad symbol libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends kicad-symbols
      - run: npm ci --ignore-scripts
      - run: uv sync --locked --extra dev --extra mcp
      - name: Enforce MCP stdout protocol hygiene
        run: uv run pytest -q tests/test_mcp_stdio.py
      - run: uv run pytest

  test-windows:
    name: Windows Python 3.11
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true
      - run: npm ci --ignore-scripts
      - run: uv sync --locked --extra dev --extra mcp
      - name: Enforce MCP stdout protocol hygiene
        run: uv run pytest -q tests/test_mcp_stdio.py
      - run: uv run pytest
        env:
          PYTESTPATH: tests

  package-smoke:
    name: Wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv build
      - name: Test installed wheel outside the checkout
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          uv venv "$smoke_dir/.venv" --python 3.11
          wheel="$(find "$GITHUB_WORKSPACE/dist" -name '*.whl' -print -quit)"
          uv pip install --python "$smoke_dir/.venv/bin/python" "${wheel}[mcp]"
          cd "$smoke_dir"
          .venv/bin/hw create-project smoke_project
          .venv/bin/hw validate-spec smoke_project
          timeout 5s .venv/bin/hw-mcp || test "$?" -eq 124
