name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "${GITHUB_REF_NAME#v}" = "$package_version"
      - run: uv sync --locked --extra dev --extra mcp
      - run: uv run pytest
      - run: uv build
      - run: uvx twine check dist/*
      - name: Test installed wheel
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          uv venv "$smoke_dir/.venv" --python 3.11
          wheel="$(find "$GITHUB_WORKSPACE/dist" -name '*.whl' -print -quit)"
          uv pip install --python "$smoke_dir/.venv/bin/python" "${wheel}[mcp]"
          cd "$smoke_dir"
          .venv/bin/hw create-project smoke_project
          .venv/bin/hw validate-spec smoke_project
      - name: Generate canonical review artifacts
        shell: bash
        run: |
          set -euo pipefail
          uv run hw --root . check quadruped_robot_controller --no-external
          uv run hw --root . export-review quadruped_robot_controller
          mkdir -p release-assets
          cp projects/quadruped_robot_controller/exports/working/review/bundle.json release-assets/bundle.json
          cp schemas/review_bundle.schema.json release-assets/review_bundle.schema.json
          uv run python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          schema = json.loads(Path("release-assets/review_bundle.schema.json").read_text())
          bundle = json.loads(Path("release-assets/bundle.json").read_text())
          Draft202012Validator(schema).validate(bundle)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hw-codesign-platform
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-container:
    name: Publish linux/amd64 image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Create GitHub release
    needs: [publish-pypi, publish-container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
