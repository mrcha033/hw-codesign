name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          package-manager-cache: true
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "${GITHUB_REF_NAME#v}" = "$package_version"
      - run: uv sync --locked --extra dev --extra mcp
      - name: Install KiCad symbol libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends kicad-symbols
      - run: npm ci --ignore-scripts
      - run: uv run pytest
      - run: uv build
      - run: uvx twine check dist/*
      - name: Test installed wheel
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          uv venv "$smoke_dir/.venv" --python 3.11
          wheel="$(find "$GITHUB_WORKSPACE/dist" -name '*.whl' -print -quit)"
          uv pip install --python "$smoke_dir/.venv/bin/python" "${wheel}[mcp]"
          cd "$smoke_dir"
          .venv/bin/hw create-project smoke_project
          .venv/bin/hw validate-spec smoke_project
      - name: Generate canonical review artifacts
        shell: bash
        run: |
          set -euo pipefail
          uv run hw --root . check quadruped_robot_controller --no-external
          uv run hw --root . export-review quadruped_robot_controller
          mkdir -p release-assets
          cp projects/quadruped_robot_controller/exports/working/review/bundle.json release-assets/bundle.json
          cp schemas/review_bundle.schema.json release-assets/review_bundle.schema.json
          uv run python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          schema = json.loads(Path("release-assets/review_bundle.schema.json").read_text())
          bundle = json.loads(Path("release-assets/bundle.json").read_text())
          Draft202012Validator(schema).validate(bundle)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error

  build-binaries:
    name: Build standalone binary (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            bin_suffix: ""
            archive_ext: tar.gz
          - os: macos-latest
            artifact_suffix: macos-arm64
            bin_suffix: ""
            archive_ext: tar.gz
          - os: windows-latest
            artifact_suffix: windows-x86_64
            bin_suffix: .exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install project and PyInstaller
        shell: bash
        run: |
          uv sync --locked --extra mcp
          uv pip install pyinstaller
      - name: Build binaries
        shell: bash
        run: uv run pyinstaller packaging/hw.spec --distpath packaging/dist --workpath packaging/build --noconfirm
      - name: Smoke-test hw binary
        shell: bash
        run: |
          set -euo pipefail
          smoke="$(mktemp -d)"
          ./packaging/dist/hw${{ matrix.bin_suffix }} --root "$smoke" create-project smoke_project
          ./packaging/dist/hw${{ matrix.bin_suffix }} --root "$smoke" validate-spec smoke_project
      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="hw-${version}-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            cd packaging/dist
            7z a "../../${archive}" hw.exe hw-mcp.exe
            cd ../..
          else
            tar czf "${archive}" -C packaging/dist hw hw-mcp
          fi
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hw-codesign-platform
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-container:
    name: Publish linux/amd64 image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Create GitHub release
    needs: [publish-pypi, publish-container, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: binary-macos-arm64
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: binary-windows-x86_64
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
